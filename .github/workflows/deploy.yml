name: Deploy Frontend

# Auto-deploy when code is pushed to master
on:
  push:
    branches: [master]

env:
  IMAGE: ghcr.io/sep490-oio/frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # GITHUB_TOKEN needs these permissions to push Docker images to ghcr.io
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to VPS
        run: |
          # Decode the base64-encoded SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Log in to ghcr.io on VPS, then pull and restart
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} \
            "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
             cd /opt/myapp && \
             docker compose pull frontend && \
             docker compose up -d frontend"

          # Clean up
          rm -f ~/.ssh/deploy_key
