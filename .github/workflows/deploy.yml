name: Deploy Frontend

# Auto-deploy when code is pushed to master
on:
  push:
    branches: [master]

env:
  IMAGE: ghcr.io/sep490-oio/frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # GITHUB_TOKEN needs these permissions to push Docker images to ghcr.io
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/myapp
            # Pull the freshly built image
            docker compose pull frontend
            # Recreate only the frontend container (zero-downtime for other services)
            docker compose up -d frontend
